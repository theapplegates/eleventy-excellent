---
layout: base
---

<main class="post-content">
  <article class="post">
    <header class="post-header container">
      <h1 class="post-title">{{ title }}</h1>
      <div class="post-meta">
        <time datetime="{{ date | date: '%Y-%m-%d' }}">{{ date | date: "%B %d, %Y" }}</time>
        {% if tags %}
        <div class="post-tags">
          {% for tag in tags %}
          <span class="post-tag">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </div>
    </header>
    <div class="post-body container">
      {{ content }}
    </div>
  </article>
</main>
